<p class="block_5">Frase Final</p>
	<p class="block_31">A crise que hoje te confronta pode ser a mesma que amanhã te promoverá.</p>
	<p class="block_5">Versículo-Chave</p>
	<p class="block_31">"Porque o choro pode durar uma noite, mas a alegria vem pela manhã."</p>
	<p class="block_31">— Salmo 30:5</p>
