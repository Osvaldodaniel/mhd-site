<p class="block_8">EXERCÍCIO 21 — CONSAGRE O SEU CORAÇÃO A DEUS</p>
	<p class="block_19">Reserve um momento de oração.</p>
	<p class="block_19">Agradeça pela caminhada realizada.</p>
	<p class="block_19">Entregue o seu coração, os seus sonhos, as suas feridas, os seus medos e o seu futuro nas mãos de Deus.</p>
	<p class="block_19">Peça-Lhe sabedoria para continuar a guardar o coração todos os dias.</p>
