
<!DOCTYPE html>

<head>

O Poder de Guardar o Coração

<link rel="stylesheet" href="style.css">

<style>

html,
body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:#f5f5f5;
}

.reader-header{

height:70px;

background:#5a189a;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

color:white;

font-family:Arial, sans-serif;

box-sizing:border-box;

}

.reader-header a{

color:white;

text-decoration:none;

font-weight:bold;

}

.reader-header a:hover{

opacity:.8;

}

.copyright-notice{

background:#fff3cd;

padding:12px;

text-align:center;

font-size:14px;

border-bottom:1px solid #ddd;

}

.pdf-container{

height:calc(100vh - 120px);

}

.pdf-container iframe{

width:100%;

height:100%;

border:none;

}

.watermark{

position:fixed;

bottom:20px;

right:20px;

font-size:28px;

font-weight:bold;

opacity:.12;

pointer-events:none;

z-index:9999;

}

</style>

</head>

<body>

<div class="reader-header">

<div>

src="pdfs/poder-coracao.pdf#toolbar=0&navpanes=0&scrollbar=0">

</div>

<div class="watermark">

© Osvaldo MUTUQUE

</div>

<script>

document.addEventListener(
"contextmenu",
function(e){
e.preventDefault();
}
);

document.addEventListener(
"keydown",
function(e){

if(
e.ctrlKey &&
(
e.key === "s" ||
e.key === "p" ||
e.key === "u" ||
e.key === "c" ||
e.key === "a" ||
e.key === "x"
)
){

e.preventDefault();

}

}
);

document.addEventListener(
"selectstart",
function(e){
e.preventDefault();
}
);

document.addEventListener(
"copy",
function(e){
e.preventDefault();
}
);

document.addEventListener(
"cut",
function(e){
e.preventDefault();
}
);

document.addEventListener(
"dragstart",
function(e){
e.preventDefault();
}
);

</script>

</body>

</html>
