<script>

/* BLOQUEAR CLIQUE DIREITO */

document.addEventListener(
"contextmenu",
function(e){
e.preventDefault();
}
);

/* BLOQUEAR CTRL+S CTRL+P CTRL+U CTRL+C CTRL+A CTRL+X */

document.addEventListener(
"keydown",
function(e){

if(
e.ctrlKey &&
(
e.key === "s" ||
e.key === "p" ||
e.key === "u" ||
e.key === "c" ||
e.key === "a" ||
e.key === "x"
)
){

e.preventDefault();

}

}
);

/* BLOQUEAR SELEÇÃO DE TEXTO */

document.addEventListener(
"selectstart",
function(e){
e.preventDefault();
}
);

/* BLOQUEAR CÓPIA */

document.addEventListener(
"copy",
function(e){
e.preventDefault();
}
);

/* BLOQUEAR RECORTE */

document.addEventListener(
"cut",
function(e){
e.preventDefault();
}
);

/* BLOQUEAR ARRASTAR */

document.addEventListener(
"dragstart",
function(e){
e.preventDefault();
}
);

</script>
