<style>

body{
margin:0;
padding:0;
background:#f3f3f3;
font-family:Arial,sans-serif;
}

/* CABEÇALHO */

.reader-header{

height:70px;

background:#5a189a;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 25px;

color:white;

font-weight:bold;

}

.reader-header a{

color:white;

text-decoration:none;

}

.reader-header a:hover{

opacity:.8;

}

/* AVISO */

.copyright-notice{

background:#fff3cd;

padding:12px;

text-align:center;

font-size:14px;

border-bottom:1px solid #ddd;

}

/* LIVRO */

.book-viewer{

width:96%;

max-width:1500px;

margin:20px auto;

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 8px 30px rgba(0,0,0,.10);

}

.book-viewer iframe{

width:100%;

height:calc(100vh - 180px);

border:none;

background:white;

}

/* NAVEGAÇÃO */

.reader-navigation{

width:96%;

max-width:1500px;

margin:20px auto 40px;

display:flex;

justify-content:space-between;

align-items:center;

}

.reader-navigation button{

background:#5a189a;

color:white;

border:none;

padding:12px 25px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

font-size:15px;

}

.reader-navigation button:hover{

opacity:.9;

}

#contador{

font-weight:bold;

font-size:16px;

color:#333;

}

/* MARCA DE ÁGUA */

.watermark{

position:fixed;

bottom:20px;

right:20px;

font-size:28px;

font-weight:bold;

opacity:.08;

pointer-events:none;

z-index:9999;

}

/* MOBILE */

@media(max-width:768px){

.reader-header{

font-size:13px;

padding:0 10px;

}

.book-viewer iframe{

height:75vh;

}

.reader-navigation{

flex-direction:column;

gap:15px;

}

.reader-navigation button{

width:100%;

}

}

</style>

</head>

<body>

<div class="reader-header">

</iframe>

← Página Anterior
</button>

<span id="contador">
1 / 35
</span>

<button onclick="reiniciarLeitura()">
Recomeçar
</button>

<button onclick="proximaPagina()">
Próxima Página →
</button>

</div>

<div class="watermark">

© Osvaldo MUTUQUE

</div>

<script>

/* PROTEÇÃO */

document.addEventListener("contextmenu", function(e){
e.preventDefault();
});

document.addEventListener("keydown", function(e){

if(
e.ctrlKey &&
(
e.key === "s" ||
e.key === "p" ||
e.key === "u"
)
){
e.preventDefault();
}

});

/* LISTA DE PÁGINAS */

const paginas = [

"titlepage.xhtml",

"index_split_000.html",
"index_split_001.html",
"index_split_002.html",
"index_split_003.html",
"index_split_004.html",
"index_split_005.html",
"index_split_006.html",
"index_split_007.html",
"index_split_008.html",
"index_split_009.html",
"index_split_010.html",
"index_split_011.html",
"index_split_012.html",
"index_split_013.html",
"index_split_014.html",
"index_split_015.html",
"index_split_016.html",
"index_split_017.html",
"index_split_018.html",
"index_split_019.html",
"index_split_020.html",
"index_split_021.html",
"index_split_022.html",
"index_split_023.html",
"index_split_024.html",
"index_split_025.html",
"index_split_026.html",
"index_split_027.html",
"index_split_028.html",
"index_split_029.html",
"index_split_030.html",
"index_split_031.html",
"index_split_032.html",
"index_split_033.html"

];

/* RECUPERAR ÚLTIMA PÁGINA */

let paginaAtual =
parseInt(localStorage.getItem("mapaVol1Pagina")) || 0;

/* CARREGAR PÁGINA */

function carregarPagina(){

document.getElementById("bookFrame").src =
"livros/mapa-vol1/" + paginas[paginaAtual];

document.getElementById("contador").innerHTML =
(paginaAtual + 1) + " / " + paginas.length;

localStorage.setItem(
"mapaVol1Pagina",
paginaAtual
);

}

/* PRÓXIMA */

function proximaPagina(){

if(paginaAtual < paginas.length - 1){

paginaAtual++;

carregarPagina();

}

}

/* ANTERIOR */

function paginaAnterior(){

if(paginaAtual > 0){

paginaAtual--;

carregarPagina();

}

}

/* RECOMEÇAR */

function reiniciarLeitura(){

if(confirm(
"Deseja voltar para o início do livro?"
)){

paginaAtual = 0;

localStorage.removeItem(
"mapaVol1Pagina"
);

carregarPagina();

}

}

/* INICIAR */

carregarPagina();

</script>


</body>

</html>
